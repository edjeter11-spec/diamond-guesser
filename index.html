<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diamond Guesser">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e1a">
<title>Diamond Guesser</title>
<style>
:root{--bg:#0a0e1a;--card:#111827;--card2:#1a2332;--accent:#f59e0b;--accent2:#10b981;--red:#ef4444;--blue:#3b82f6;--text:#f1f5f9;--muted:#64748b;--radius:12px;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:var(--bg)}
body{min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;padding:calc(8px + var(--safe-top)) 8px calc(8px + var(--safe-bot));-webkit-tap-highlight-color:transparent;user-select:none;overflow-x:hidden}
.screen{display:none;flex-direction:column;gap:8px;max-width:480px;margin:0 auto;width:100%}
.screen.active{display:flex}
.home-header{text-align:center;padding:24px 0 8px}
.home-header h1{font-size:28px;font-weight:800;letter-spacing:-0.5px}
.home-header h1 span{color:var(--accent)}
.home-header p{color:var(--muted);font-size:13px;margin-top:4px}
.game-list{display:flex;flex-direction:column;gap:6px}
.game-list-header{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.game-list-header h2{font-size:15px;font-weight:700;color:var(--muted)}
.refresh-btn{background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;font-weight:600;padding:4px 8px;border-radius:6px}
.refresh-btn:active{background:rgba(245,158,11,0.15)}
.game-card{background:var(--card);border-radius:var(--radius);padding:12px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid transparent;transition:border-color .2s;position:relative;overflow:hidden}
.game-card:active{border-color:var(--accent)}
.game-card.live::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--red);border-radius:3px 0 0 3px}
.game-card.live .gc-status{color:var(--red)}
.game-card.final .gc-status{color:var(--muted)}
.game-card.preview .gc-status{color:var(--blue)}
.gc-teams{flex:1;min-width:0}
.gc-team{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:2px 0}
.gc-team-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gc-score{font-weight:700;font-size:16px;min-width:20px;text-align:right}
.gc-meta{text-align:right;min-width:60px}
.gc-status{font-size:11px;font-weight:700;text-transform:uppercase}
.gc-arrow{color:var(--muted);font-size:18px}
.section-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:8px 0 2px}
.manual-entry{display:flex;gap:8px;align-items:center;background:var(--card);border-radius:var(--radius);padding:10px 12px}
.manual-entry input{flex:1;background:var(--card2);border:1px solid #334155;border-radius:8px;padding:8px 10px;color:var(--text);font-size:14px;outline:none}
.manual-entry input:focus{border-color:var(--accent)}
.manual-entry button{background:var(--accent);color:#000;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
.lb-card{background:var(--card);border-radius:var(--radius);padding:12px}
.lb-card h3{font-size:14px;font-weight:700;margin-bottom:6px;color:var(--accent)}
.lb-row{display:flex;justify-content:space-between;padding:3px 0;font-size:13px}
.lb-row .rank{color:var(--muted);min-width:24px}
.lb-row .name{flex:1}
.lb-row .pts{font-weight:700;color:var(--accent)}
.game-top-bar{display:flex;align-items:center;gap:8px;padding:4px 0}
.back-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px;border-radius:6px;line-height:1}
.back-btn:active{background:rgba(255,255,255,0.05)}
.game-info{flex:1;text-align:center}
.game-info .gi-teams{font-weight:700;font-size:14px}
.game-info .gi-state{font-size:12px;color:var(--muted)}
.scoreboard{display:flex;gap:8px}
.sb-card{flex:1;background:var(--card);border-radius:var(--radius);padding:10px;text-align:center}
.sb-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.sb-score{font-size:28px;font-weight:800;margin-top:2px}
.sb-card.you .sb-score{color:var(--accent2)}
.sb-card.cpu .sb-score{color:var(--blue)}
.sb-card.streak .sb-score{color:var(--accent);font-size:22px}
.matchup-bar{background:var(--card);border-radius:var(--radius);padding:10px 12px;text-align:center}
.matchup-bar .pitcher{color:var(--red);font-weight:700}
.matchup-bar .batter{color:var(--accent2);font-weight:700}
.matchup-bar .vs{color:var(--muted);margin:0 6px}
.count-display{font-size:12px;color:var(--muted);margin-top:4px}
.count-display span{font-weight:700;color:var(--text)}
.tracker-container{display:flex;gap:8px;align-items:stretch}
.zone-wrap{flex:0 0 160px;display:flex;flex-direction:column;align-items:center}
.zone-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.strike-zone-svg{width:160px;height:200px;background:var(--card);border-radius:var(--radius)}
.pred-panel{flex:1;display:flex;flex-direction:column;gap:6px}
.pred-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.pred-btn{flex:1;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:transform .1s,filter .15s;min-height:48px;position:relative;overflow:hidden}
.pred-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .15s}
.pred-btn:active:not(:disabled)::after{background:rgba(255,255,255,0.15)}
.pred-btn:active:not(:disabled){transform:scale(0.97)}
.pred-btn:disabled{opacity:0.3;cursor:default}
.pred-btn.ball{background:#166534;color:#4ade80}
.pred-btn.strike{background:#7f1d1d;color:#fca5a5}
.pred-btn.inplay{background:#78350f;color:#fcd34d}
.status-bar{background:var(--card);border-radius:var(--radius);padding:10px 12px;text-align:center;font-weight:600;font-size:14px;transition:background .3s,color .3s;min-height:42px;display:flex;align-items:center;justify-content:center}
.status-bar.correct{background:#166534;color:#4ade80}
.status-bar.wrong{background:#7f1d1d;color:#fca5a5}
.delay-bar{display:flex;align-items:center;gap:8px;background:var(--card);border-radius:var(--radius);padding:8px 12px}
.delay-bar label{font-size:12px;color:var(--muted);white-space:nowrap;font-weight:600}
.delay-bar input[type=range]{flex:1;accent-color:var(--accent);height:20px}
.delay-bar .delay-val{font-size:13px;font-weight:700;min-width:40px;text-align:center;color:var(--accent)}
.history-panel{background:var(--card);border-radius:var(--radius);padding:10px 12px;max-height:160px;overflow-y:auto}
.history-panel h3{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.hist-entry{padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px;line-height:1.5}
.hist-entry:last-child{border:none}
.hist-entry .pitch-num{color:var(--accent);font-weight:700}
.hist-entry .pts-good{color:var(--accent2);font-weight:700}
.hist-entry .pts-bad{color:var(--red)}
.halftime-alert{display:none;background:linear-gradient(135deg,#78350f,#92400e);border-radius:var(--radius);padding:12px;text-align:center;animation:pulse 2s ease-in-out infinite}
.halftime-alert.show{display:block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.85}}
.halftime-alert h3{color:var(--accent);font-size:15px;margin-bottom:4px}
.halftime-alert p{font-size:13px}
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius);height:60px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
</style>
</head>
<body><div class="screen active" id="screenHome">
  <div class="home-header">
    <h1>&#9918; <span>Diamond</span> Guesser</h1>
    <p>Predict the pitch before it hits the TV</p>
  </div>
  <div class="game-list">
    <div class="game-list-header">
      <h2>&#128308; Live Games</h2>
      <button class="refresh-btn" id="refreshGames">Refresh</button>
    </div>
    <div id="liveGamesList"></div>
  </div>
  <div id="otherGamesSection" style="display:none">
    <div class="section-label">Other Games</div>
    <div id="otherGamesList"></div>
  </div>
  <div class="section-label">Manual Entry</div>
  <div class="manual-entry">
    <input type="text" id="manualGameID" inputmode="numeric" placeholder="Enter Game ID...">
    <button id="manualStartBtn">GO</button>
  </div>
  <div class="lb-card" id="homeLB"></div>
</div>
<div class="screen" id="screenGame">
  <div class="game-top-bar">
    <button class="back-btn" id="backBtn">&#8592;</button>
    <div class="game-info">
      <div class="gi-teams" id="giTeams">&mdash;</div>
      <div class="gi-state" id="giState">&mdash;</div>
    </div>
  </div>
  <div class="scoreboard">
    <div class="sb-card you"><div class="sb-label">You</div><div class="sb-score" id="yourScore">0</div></div>
    <div class="sb-card streak"><div class="sb-label">Streak</div><div class="sb-score" id="streakDisplay">0&#128293;</div></div>
    <div class="sb-card cpu"><div class="sb-label">CPU</div><div class="sb-score" id="cpuScore">0</div></div>
  </div>
  <div class="halftime-alert" id="halftimeAlert"><h3 id="htTitle"></h3><p id="htBody"></p></div>
  <div class="matchup-bar">
    <span class="pitcher" id="pitcherName">&mdash;</span>
    <span class="vs">vs</span>
    <span class="batter" id="batterName">&mdash;</span>
    <div class="count-display" id="countDisplay"></div>
  </div>
  <div class="tracker-container">
    <div class="zone-wrap">
      <div class="zone-label">Pitch Tracker</div>
      <svg class="strike-zone-svg" id="strikeZoneSVG" viewBox="0 0 160 200">
        <rect x="0" y="0" width="160" height="200" rx="12" fill="#111827"/>
        <rect id="szRect" x="35" y="35" width="90" height="120" rx="2" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
        <line id="szH1" x1="35" y1="75" x2="125" y2="75" stroke="#1e293b" stroke-width="0.5"/>
        <line id="szH2" x1="35" y1="115" x2="125" y2="115" stroke="#1e293b" stroke-width="0.5"/>
        <line id="szV1" x1="65" y1="35" x2="65" y2="155" stroke="#1e293b" stroke-width="0.5"/>
        <line id="szV2" x1="95" y1="35" x2="95" y2="155" stroke="#1e293b" stroke-width="0.5"/>
        <polygon points="65,185 80,192 95,185 95,180 65,180" fill="#334155"/>
        <g id="pitchDots"></g>
      </svg>
    </div>
    <div class="pred-panel">
      <div class="pred-label">Your Call</div>
      <button class="pred-btn ball" id="btnBall" disabled>&#9918; Ball</button>
      <button class="pred-btn strike" id="btnStrike" disabled>&#128293; Strike</button>
      <button class="pred-btn inplay" id="btnInPlay" disabled>&#128165; In Play</button>
    </div>
  </div>
  <div class="status-bar" id="statusBar">Waiting for game data...</div>
  <div class="delay-bar">
    <label>&#128250; TV Delay</label>
    <input type="range" id="delaySlider" min="0" max="90" value="30">
    <div class="delay-val" id="delayVal">30s</div>
  </div>
  <div class="history-panel"><h3>Pitch Log</h3><div id="historyLog"></div></div>
</div><script>
const S={gameId:null,gameActive:false,userScore:0,cpuScore:0,streak:0,bestStreak:0,userPick:'',cpuPick:'',lastPitchNum:0,pendingPitches:[],halfTimeShown:false,pitchHistory:[],awayTeam:'',homeTeam:'',fetchInterval:null,queueInterval:null,playerName:localStorage.getItem('dg_name')||'',leaderboard:JSON.parse(localStorage.getItem('dg_lb')||'[]')};
const $=id=>document.getElementById(id);
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')}
$('backBtn').addEventListener('click',()=>{stopGame();showScreen('screenHome');renderHomeLB()});
async function loadGames(){
  const liveList=$('liveGamesList'),otherList=$('otherGamesList'),otherSec=$('otherGamesSection');
  liveList.innerHTML='<div class="skeleton"></div>';otherList.innerHTML='';otherSec.style.display='none';
  try{
    const d=new Date(),ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const r=await fetch('https://statsapi.mlb.com/api/v1/schedule?sportId=1&date='+ds+'&hydrate=linescore');
    const data=await r.json(),games=(data.dates&&data.dates[0]&&data.dates[0].games)||[];
    const live=games.filter(g=>g.status.abstractGameState==='Live');
    const other=games.filter(g=>g.status.abstractGameState!=='Live');
    if(!live.length&&!other.length){liveList.innerHTML='<div style="text-align:center;color:#64748b;padding:20px">No games scheduled today</div>';return}
    liveList.innerHTML='';
    if(!live.length)liveList.innerHTML='<div style="text-align:center;color:#64748b;padding:12px;font-size:13px">No live games right now</div>';
    live.forEach(g=>liveList.appendChild(makeGameCard(g,'live')));
    if(other.length){otherSec.style.display='block';other.forEach(g=>{const cls=g.status.abstractGameState==='Final'?'final':'preview';otherList.appendChild(makeGameCard(g,cls))})}
  }catch(e){liveList.innerHTML='<div style="text-align:center;color:#ef4444;padding:16px">Failed to load games</div>'}
}
function makeGameCard(g,cls){
  const card=document.createElement('div');card.className='game-card '+cls;
  const away=g.teams.away,home=g.teams.home,ls=g.linescore||{},inning=ls.currentInning||'',half=ls.inningHalf||'',status=g.status.detailedState;
  let stateText=status;if(cls==='live'&&inning)stateText=(half==='Top'?'\u25B2':'\u25BC')+' '+inning;
  card.innerHTML='<div class="gc-teams"><div class="gc-team"><span class="gc-team-name">'+(away.team.abbreviation||away.team.name)+'</span><span class="gc-score">'+(away.score!=null?away.score:'')+'</span></div><div class="gc-team"><span class="gc-team-name">'+(home.team.abbreviation||home.team.name)+'</span><span class="gc-score">'+(home.score!=null?home.score:'')+'</span></div></div><div class="gc-meta"><div class="gc-status">'+stateText+'</div></div><div class="gc-arrow">\u203A</div>';
  card.addEventListener('click',()=>startGame(g.gamePk,away.team.name,home.team.name));return card
}
$('refreshGames').addEventListener('click',loadGames);
$('manualStartBtn').addEventListener('click',()=>{const gid=$('manualGameID').value.trim();if(gid&&!isNaN(gid))startGame(parseInt(gid),'Away','Home')});
function startGame(gameId,away,home){
  if(S.gameActive&&S.userScore>0)saveLB();
  Object.assign(S,{gameId,awayTeam:away,homeTeam:home,gameActive:true,userScore:0,cpuScore:0,streak:0,bestStreak:0,userPick:'',cpuPick:'',lastPitchNum:0,pendingPitches:[],halfTimeShown:false,pitchHistory:[]});
  $('giTeams').textContent=away+' vs '+home;$('giState').textContent='Connecting...';
  $('yourScore').textContent='0';$('cpuScore').textContent='0';$('streakDisplay').innerHTML='0\uD83D\uDD25';
  $('pitcherName').textContent='\u2014';$('batterName').textContent='\u2014';$('countDisplay').textContent='';
  $('statusBar').textContent='Connecting to MLB API...';$('statusBar').className='status-bar';
  $('historyLog').innerHTML='';$('halftimeAlert').classList.remove('show');
  clearZone();setPred(true);showScreen('screenGame');
  clearInterval(S.fetchInterval);clearInterval(S.queueInterval);
  fetchGame();S.fetchInterval=setInterval(fetchGame,4000);S.queueInterval=setInterval(processQueue,1000);
}
function stopGame(){S.gameActive=false;clearInterval(S.fetchInterval);clearInterval(S.queueInterval);if(S.userScore>0)saveLB()}
async function fetchGame(){
  if(!S.gameActive)return;
  try{const r=await fetch('https://statsapi.mlb.com/api/v1.1/game/'+S.gameId+'/feed/live');if(!r.ok)throw new Error(r.status);parseGame(await r.json())}
  catch(e){$('statusBar').textContent='\u26A0 API error \u2014 retrying...'}
}
function parseGame(d){
  if(!d||!d.liveData)return;
  const ls=d.liveData.linescore||{},inning=ls.currentInning||0,half=ls.inningHalf||'';
  const arrow=half==='Top'?'\u25B2':'\u25BC';
  $('giState').textContent=arrow+' '+ordinal(inning)+' \u2014 '+(d.gameData&&d.gameData.status?d.gameData.status.detailedState:'Live');
  try{const as=ls.teams.away.runs||0,hs=ls.teams.home.runs||0;const aA=d.gameData.teams.away.abbreviation||S.awayTeam,hA=d.gameData.teams.home.abbreviation||S.homeTeam;$('giTeams').textContent=aA+' '+as+' \u2014 '+hA+' '+hs}catch(e){}
  const cp=d.liveData.plays&&d.liveData.plays.currentPlay;
  if(cp&&cp.matchup){$('pitcherName').textContent=cp.matchup.pitcher?cp.matchup.pitcher.fullName:'\u2014';$('batterName').textContent=cp.matchup.batter?cp.matchup.batter.fullName:'\u2014'}
  if(cp&&cp.count){const c=cp.count;$('countDisplay').innerHTML='<span>'+c.balls+'</span>-<span>'+c.strikes+'</span> \u2022 '+c.outs+' out'}
  if(inning>=5&&!S.halfTimeShown)showHalftime(inning,half);
  const events=cp&&cp.playEvents;if(!events||!events.length)return;
  for(let i=0;i<events.length;i++){
    const ev=events[i];if(!ev.isPitch)continue;const pn=ev.pitchNumber;if(pn<=S.lastPitchNum)continue;
    S.lastPitchNum=pn;
    S.pendingPitches.push({pitchNum:pn,time:Date.now()/1000,desc:ev.details?ev.details.description:'?',callCode:ev.details&&ev.details.call?ev.details.call.code:'',typeCode:ev.details&&ev.details.type?ev.details.type.code:'',typeDesc:ev.details&&ev.details.type?ev.details.type.description:'',pX:ev.pitchData&&ev.pitchData.coordinates?ev.pitchData.coordinates.pX:null,pZ:ev.pitchData&&ev.pitchData.coordinates?ev.pitchData.coordinates.pZ:null,szTop:ev.pitchData?ev.pitchData.strikeZoneTop||3.5:3.5,szBot:ev.pitchData?ev.pitchData.strikeZoneBottom||1.5:1.5,speed:ev.pitchData?ev.pitchData.startSpeed:null,count:ev.count?ev.count.balls+'-'+ev.count.strikes:''});
    $('statusBar').textContent='\uD83D\uDCE1 Pitch #'+pn+' received \u2014 syncing to TV...';$('statusBar').className='status-bar';
  }
}
function processQueue(){
  if(!S.gameActive)return;const delay=parseInt($('delaySlider').value),now=Date.now()/1000;
  S.pendingPitches=S.pendingPitches.filter(p=>{if(now-p.time>=delay){resolvePitch(p);return false}return true});
}
$('delaySlider').addEventListener('input',e=>{$('delayVal').textContent=e.target.value+'s'});
$('btnBall').addEventListener('click',()=>predict('Ball'));
$('btnStrike').addEventListener('click',()=>predict('Strike'));
$('btnInPlay').addEventListener('click',()=>predict('InPlay'));
function predict(choice){
  if(S.userPick||!S.gameActive)return;S.userPick=choice;setPred(false);
  $('statusBar').textContent='\uD83D\uDD12 Locked: '+choice+' \u2014 waiting...';$('statusBar').className='status-bar';
  const r=Math.random()*100;S.cpuPick=r<55?'Ball':r<90?'Strike':'InPlay';
  if(navigator.vibrate)navigator.vibrate(30);
}
function setPred(on){$('btnBall').disabled=!on;$('btnStrike').disabled=!on;$('btnInPlay').disabled=!on}
function resolvePitch(p){
  drawPitch(p);let uPts=0;
  if(S.userPick){
    const cc=p.callCode;
    if(S.userPick==='Ball'&&cc==='B')uPts=10;
    else if(S.userPick==='Strike'&&(cc==='C'||cc==='S'||cc==='F'||cc==='T'))uPts=10;
    else if(S.userPick==='InPlay'&&(cc==='D'||cc==='E'||cc==='X'))uPts=50;
    if(uPts>0){S.streak++;if(S.streak>S.bestStreak)S.bestStreak=S.streak;if(S.streak>=3)uPts+=(S.streak-2)*5}else S.streak=0;
    S.userScore+=uPts;
    if(uPts>0){$('statusBar').textContent='\u2705 +'+uPts+' pts! '+p.desc;$('statusBar').className='status-bar correct';if(navigator.vibrate)navigator.vibrate([50,30,50])}
    else{$('statusBar').textContent='\u274C Nope! '+p.desc;$('statusBar').className='status-bar wrong';if(navigator.vibrate)navigator.vibrate(100)}
  }else{$('statusBar').textContent='\u23E9 '+p.desc+' (no pick)';$('statusBar').className='status-bar'}
  let cPts=0;if(S.cpuPick){const cc=p.callCode;if(S.cpuPick==='Ball'&&cc==='B')cPts=10;else if(S.cpuPick==='Strike'&&(cc==='C'||cc==='S'||cc==='F'||cc==='T'))cPts=10;else if(S.cpuPick==='InPlay'&&(cc==='D'||cc==='E'||cc==='X'))cPts=50;S.cpuScore+=cPts}
  $('yourScore').textContent=S.userScore;$('cpuScore').textContent=S.cpuScore;$('streakDisplay').innerHTML=S.streak+'\uD83D\uDD25';
  addHistory(p,uPts);S.userPick='';S.cpuPick='';setPred(true);
  setTimeout(()=>{$('statusBar').className='status-bar';if(!S.userPick&&S.gameActive)$('statusBar').textContent='\uD83C\uDFAF Make your call!'},2500);
}
function clearZone(){$('pitchDots').innerHTML='';S.pitchHistory=[]}
function drawPitch(p){
  if(p.pX===null||p.pZ===null)return;
  const svgX=80+(p.pX/2)*80,svgY=200-(p.pZ/5)*200;
  let color='#64748b';const cc=p.callCode;
  if(cc==='B')color='#4ade80';else if(cc==='C'||cc==='S'||cc==='T')color='#ef4444';else if(cc==='F')color='#f59e0b';else if(cc==='D'||cc==='E'||cc==='X')color='#3b82f6';
  const dots=$('pitchDots');
  dots.querySelectorAll('circle').forEach(c=>{c.setAttribute('opacity',Math.max(0.15,parseFloat(c.getAttribute('opacity')||1)-0.15))});
  dots.querySelectorAll('text').forEach(t=>{t.setAttribute('opacity',Math.max(0.1,parseFloat(t.getAttribute('opacity')||1)-0.15))});
  S.pitchHistory.push({x:svgX,y:svgY,color});
  if(S.pitchHistory.length>15){S.pitchHistory.shift();if(dots.children.length>=2){dots.removeChild(dots.children[0]);dots.removeChild(dots.children[0])}}
  const szTop=200-(p.szTop/5)*200,szBot=200-(p.szBot/5)*200,szH=szBot-szTop;
  $('szRect').setAttribute('y',szTop);$('szRect').setAttribute('height',szH);
  const t1=szH/3;$('szH1').setAttribute('y1',szTop+t1);$('szH1').setAttribute('y2',szTop+t1);
  $('szH2').setAttribute('y1',szTop+2*t1);$('szH2').setAttribute('y2',szTop+2*t1);
  [$('szV1'),$('szV2')].forEach(l=>{l.setAttribute('y1',szTop);l.setAttribute('y2',szBot)});
  if(p.speed){const txt=document.createElementNS('http://www.w3.org/2000/svg','text');txt.setAttribute('x',svgX);txt.setAttribute('y',svgY+3.5);txt.setAttribute('text-anchor','middle');txt.setAttribute('font-size','7');txt.setAttribute('font-weight','700');txt.setAttribute('fill','#000');txt.setAttribute('opacity','1');txt.textContent=Math.round(p.speed);dots.appendChild(txt)}
  const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');circle.setAttribute('cx',svgX);circle.setAttribute('cy',svgY);circle.setAttribute('r','6');circle.setAttribute('fill',color);circle.setAttribute('opacity','1');circle.setAttribute('stroke','#fff');circle.setAttribute('stroke-width','1.5');dots.appendChild(circle);
}
function addHistory(p,uPts){
  const log=$('historyLog'),el=document.createElement('div');el.className='hist-entry';
  const typeLabel=p.typeDesc?' ('+p.typeDesc+(p.speed?' '+Math.round(p.speed)+'mph':'')+')'  :'';
  const ptsHtml=uPts>0?'<span class="pts-good">+'+uPts+'</span>':'<span class="pts-bad">+0</span>';
  el.innerHTML='<span class="pitch-num">#'+p.pitchNum+'</span> '+p.desc+typeLabel+' '+ptsHtml;
  log.prepend(el);while(log.children.length>30)log.removeChild(log.lastChild);
}
function showHalftime(inn,half){
  S.halfTimeShown=true;$('htTitle').textContent='\uD83C\uDFDF Mid-Game \u2014 '+half+' '+ordinal(inn);
  let msg='You: '+S.userScore+' pts | CPU: '+S.cpuScore+' pts\n';
  if(S.userScore>S.cpuScore)msg+='\uD83D\uDFE2 You are winning!';else if(S.cpuScore>S.userScore)msg+='\uD83D\uDD34 CPU leads \u2014 rally!';else msg+='\uD83D\uDFE1 Tied!';
  $('htBody').textContent=msg;$('halftimeAlert').classList.add('show');
  setTimeout(()=>$('halftimeAlert').classList.remove('show'),8000);
}
function saveLB(){
  if(!S.playerName){S.playerName=prompt('Your name for the leaderboard:','Player 1')||'Anonymous';localStorage.setItem('dg_name',S.playerName)}
  let found=false;for(const e of S.leaderboard){if(e.n===S.playerName){if(e.s<S.userScore)e.s=S.userScore;found=true;break}}
  if(!found)S.leaderboard.push({n:S.playerName,s:S.userScore});
  S.leaderboard.sort((a,b)=>b.s-a.s);if(S.leaderboard.length>10)S.leaderboard.length=10;
  localStorage.setItem('dg_lb',JSON.stringify(S.leaderboard));
}
function renderHomeLB(){
  const el=$('homeLB');if(!S.leaderboard.length){el.innerHTML='<h3>\uD83C\uDFC6 Leaderboard</h3><div style="color:#64748b;font-size:13px">No scores yet</div>';return}
  let html='<h3>\uD83C\uDFC6 Leaderboard</h3>';
  S.leaderboard.slice(0,5).forEach((e,i)=>{const medal=i===0?'\uD83E\uDD47':i===1?'\uD83E\uDD48':i===2?'\uD83E\uDD49':'';html+='<div class="lb-row"><span class="rank">'+(medal||(i+1)+'.')+'</span><span class="name">'+e.n+'</span><span class="pts">'+e.s+'</span></div>'});
  el.innerHTML=html;
}
function ordinal(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0])}
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){clearInterval(S.fetchInterval);clearInterval(S.queueInterval)}
  else if(S.gameActive){fetchGame();S.fetchInterval=setInterval(fetchGame,4000);S.queueInterval=setInterval(processQueue,1000)}
});
window.addEventListener('beforeunload',()=>{if(S.userScore>0)saveLB()});
renderHomeLB();loadGames();
</script>
</body>
</html>
