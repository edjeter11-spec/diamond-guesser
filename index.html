<div class="status-bar" id="statusBar">Waiting for game data...</div><div class="delay-bar"><label>&#128250; TV Delay</label><input type="range" id="delaySlider" min="0" max="90" value="30"><div class="delay-val" id="delayVal">30s</div></div><div class="history-panel"><h3>Pitch Log</h3><div id="historyLog"></div></div></div><script>
const S={gameId:null,gameActive:false,userScore:0,cpuScore:0,streak:0,bestStreak:0,userPick:'',cpuPick:'',rbiPick:false,rbiPickCPU:false,lastPitchNum:0,pendingPitches:[],halfTimeShown:false,pitchHistory:[],awayTeam:'',homeTeam:'',fetchInterval:null,queueInterval:null,runnersOn:0,playerName:localStorage.getItem('dg_name')||'',leaderboard:JSON.parse(localStorage.getItem('dg_lb')||'[]')};
const $=id=>document.getElementById(id);function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')}$('backBtn').addEventListener('click',()=>{stopGame();showScreen('screenHome');renderHomeLB()});
async function loadGames(){const liveList=$('liveGamesList'),otherList=$('otherGamesList'),otherSec=$('otherGamesSection');liveList.innerHTML='<div class="skeleton"></div>';otherList.innerHTML='';otherSec.style.display='none';try{const d=new Date(),ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');const r=await fetch('https://statsapi.mlb.com/api/v1/schedule?sportId=1&date='+ds+'&hydrate=linescore');const data=await r.json(),games=(data.dates&&data.dates[0]&&data.dates[0].games)||[];const live=games.filter(g=>g.status.abstractGameState==='Live');const other=games.filter(g=>g.status.abstractGameState!=='Live');if(!live.length&&!other.length){liveList.innerHTML='<div style="text-align:center;color:#64748b;padding:20px">No games scheduled today</div>';return}liveList.innerHTML='';if(!live.length)liveList.innerHTML='<div style="text-align:center;color:#64748b;padding:12px;font-size:13px">No live games right now</div>';live.forEach(g=>liveList.appendChild(makeGameCard(g,'live')));if(other.length){otherSec.style.display='block';other.forEach(g=>{const cls=g.status.abstractGameState==='Final'?'final':'preview';otherList.appendChild(makeGameCard(g,cls))})}}catch(e){liveList.innerHTML='<div style="text-align:center;color:#ef4444;padding:16px">Failed to load games</div>'}}
function makeGameCard(g,cls){const card=document.createElement('div');card.className='game-card '+cls;const away=g.teams.away,home=g.teams.home,ls=g.linescore||{},inning=ls.currentInning||'',half=ls.inningHalf||'',status=g.status.detailedState;let stateText=status;if(cls==='live'&&inning)stateText=(half==='Top'?'\u25B2':'\u25BC')+' '+inning;card.innerHTML='<div class="gc-teams"><div class="gc-team"><span class="gc-team-name">'+(away.team.abbreviation||away.team.name)+'</span><span class="gc-score">'+(away.score!=null?away.score:'')+'</span></div><div class="gc-team"><span class="gc-team-name">'+(home.team.abbreviation||home.team.name)+'</span><span class="gc-score">'+(home.score!=null?home.score:'')+'</span></div></div><div class="gc-meta"><div class="gc-status">'+stateText+'</div></div><div class="gc-arrow">\u203A</div>';card.addEventListener('click',()=>startGame(g.gamePk,away.team.name,home.team.name));return card}
$('refreshGames').addEventListener('click',loadGames);$('manualStartBtn').addEventListener('click',()=>{const gid=$('manualGameID').value.trim();if(gid&&!isNaN(gid))startGame(parseInt(gid),'Away','Home')});
function startGame(gameId,away,home){if(S.gameActive&&S.userScore>0)saveLB();Object.assign(S,{gameId,awayTeam:away,homeTeam:home,gameActive:true,userScore:0,cpuScore:0,streak:0,bestStreak:0,userPick:'',cpuPick:'',lastPitchNum:0,pendingPitches:[],halfTimeShown:false,pitchHistory:[]});$('giTeams').textContent=away+' vs '+home;$('giState').textContent='Connecting...';$('yourScore').textContent='0';$('cpuScore').textContent='0';$('streakDisplay').innerHTML='0\uD83D\uDD25';$('pitcherName').textContent='\u2014';$('batterName').textContent='\u2014';$('countDisplay').textContent='';$('statusBar').textContent='Connecting to MLB API...';$('statusBar').className='status-bar';$('historyLog').innerHTML='';$('halftimeAlert').classList.remove('show');clearZone();setPred(true);showScreen('screenGame');clearInterval(S.fetchInterval);clearInterval(S.queueInterval);fetchGame();S.fetchInterval=setInterval(fetchGame,4000);S.queueInterval=setInterval(processQueue,1000)}
function stopGame(){S.gameActive=false;clearInterval(S.fetchInterval);clearInterval(S.queueInterval);if(S.userScore>0)saveLB()}
async function fetchGame(){if(!S.gameActive)return;try{const r=await fetch('https://statsapi.mlb.com/api/v1.1/game/'+S.gameId+'/feed/live');if(!r.ok)throw new Error(r.status);parseGame(await r.json())}catch(e){$('statusBar').textContent='\u26A0 API error \u2014 retrying...'}}
function parseGame(d){if(!d||!d.liveData)return;const ls=d.liveData.linescore||{},inning=ls.currentInning||0,half=ls.inningHalf||'';const arrow=half==='Top'?'\u25B2':'\u25BC';$('giState').textContent=arrow+' '+ordinal(inning)+' \u2014 '+(d.gameData&&d.gameData.status?d.gameData.status.detailedState:'Live');try{const as=ls.teams.away.runs||0,hs=ls.teams.home.runs||0;const aA=d.gameData.teams.away.abbreviation||S.awayTeam,hA=d.gameData.teams.home.abbreviation||S.homeTeam;$('giTeams').textContent=aA+' '+as+' \u2014 '+hA+' '+hs}catch(e){}const cp=d.liveData.plays&&d.liveData.plays.currentPlay;if(cp&&cp.matchup){$('pitcherName').textContent=cp.matchup.pitcher?cp.matchup.pitcher.fullName:'\u2014';$('batterName').textContent=cp.matchup.batter?cp.matchup.batter.fullName:'\u2014'}if(cp&&cp.count){const c=cp.count;$('countDisplay').innerHTML='<span>'+c.balls+'</span>-<span>'+c.strikes+'</span> \u2022 '+c.outs+' out'}try{const off=ls.offense||{};let r=0;if(off.first)r++;if(off.second)r++;if(off.third)r++;S.runnersOn=r;const rd=$('runnersDisplay');rd.textContent=r>0?'\uD83C\uDFC3 '+r+' runner'+(r>1?'s':'')+' on base':'';$('rbiRow').style.display=r>0?'flex':'none'}catch(e){}if(inning>=5&&!S.halfTimeShown)showHalftime(inning,half);const events=cp&&cp.playEvents;if(!events||!events.length)return;for(let i=0;i<events.length;i++){const ev=events[i];if(!ev.isPitch)continue;const pn=ev.pitchNumber;if(pn<=S.lastPitchNum)continue;S.lastPitchNum=pn;const playResult=cp.result?cp.result.event||'':'';const playRbi=cp.result?cp.result.rbi||0:0;S.pendingPitches.push({pitchNum:pn,time:Date.now()/1000,desc:ev.details?ev.details.description:'?',callCode:ev.details&&ev.details.call?ev.details.call.code:'',typeCode:ev.details&&ev.details.type?ev.details.type.code:'',typeDesc:ev.details&&ev.details.type?ev.details.type.description:'',pX:ev.pitchData&&ev.pitchData.coordinates?ev.pitchData.coordinates.pX:null,pZ:ev.pitchData&&ev.pitchData.coordinates?ev.pitchData.coordinates.pZ:null,szTop:ev.pitchDat function processQueue(){if(!S.gameActive)return;const delay=parseInt($('delaySlider').value),now=Date.now()/1000;S.pendingPitches=S.pendingPitches.filter(p=>{if(now-p.time>=delay){resolvePitch(p);return false}return true})}$('delaySlider').addEventListener('input',e=>{$('delayVal').textContent=e.target.value+'s'});
$('btnBall').addEventListener('click',()=>predict('Ball'));$('btnStrike').addEventListener('click',()=>predict('Strike'));$('btnFoul').addEventListener('click',()=>predict('Foul'));$('btnOut').addEventListener('click',()=>predict('Out'));$('btnHomer').addEventListener('click',()=>predict('Homer'));$('btnHit').addEventListener('click',()=>{if(S.userPick||!S.gameActive)return;$('hitSub').classList.add('open');S.rbiPick=false;$('rbiToggle').classList.remove('on')});$('btnSingle').addEventListener('click',()=>predict('Single'));$('btnDouble').addEventListener('click',()=>predict('Double'));$('btnTriple').addEventListener('click',()=>predict('Triple'));$('rbiToggle').addEventListener('click',()=>{S.rbiPick=!S.rbiPick;$('rbiToggle').classList.toggle('on')});
function predict(choice){if(S.userPick||!S.gameActive)return;S.userPick=choice;$('hitSub').classList.remove('open');setPred(false);const lbl=choice+(S.rbiPick?' +RBI':'');$('statusBar').textContent='\uD83D\uDD12 Locked: '+lbl+' \u2014 waiting...';$('statusBar').className='status-bar';const r=Math.random()*100;const hr=Math.random()*100;S.cpuPick=r<38?'Ball':r<55?'Strike':r<73?'Foul':r<83?'Out':r<90?(hr<65?'Single':hr<90?'Double':'Triple'):'Homer';S.rbiPickCPU=S.runnersOn>0&&Math.random()<0.4;if(navigator.vibrate)navigator.vibrate(30)}
function setPred(on){['btnBall','btnStrike','btnFoul','btnOut','btnHit','btnHomer'].forEach(id=>{$(id).disabled=!on});if(!on)$('hitSub').classList.remove('open')}
function scoreCall(pick,cc,pr){if(pick==='Ball'&&cc==='B')return 5;if(pick==='Strike'&&(cc==='C'||cc==='S'||cc==='T'))return 10;if(pick==='Foul'&&cc==='F')return 15;if(pick==='Out'&&cc==='X')return 30;if(pick==='Single'&&cc==='D'&&pr==='Single')return 60;if(pick==='Double'&&cc==='D'&&pr==='Double')return 120;if(pick==='Triple'&&cc==='D'&&pr==='Triple')return 250;if((pick==='Single'||pick==='Double'||pick==='Triple')&&cc==='D')return 15;if(pick==='Homer'&&cc==='E')return 200;return 0}
function resolvePitch(p){drawPitch(p);let uPts=0;if(S.userPick){uPts=scoreCall(S.userPick,p.callCode,p.playResult);if(S.rbiPick&&p.playRbi>0)uPts+=40;if(uPts>0){S.streak++;if(S.streak>S.bestStreak)S.bestStreak=S.streak;if(S.streak>=3)uPts+=Math.floor((S.streak-2)*uPts*0.1)}else S.streak=0;S.userScore+=uPts;if(uPts>0){$('statusBar').textContent='\u2705 +'+uPts+' pts! '+p.desc;$('statusBar').className='status-bar correct';if(navigator.vibrate)navigator.vibrate([50,30,50])}else{$('statusBar').textContent='\u274C Nope! '+p.desc;$('statusBar').className='status-bar wrong';if(navigator.vibrate)navigator.vibrate(100)}}else{$('statusBar').textContent='\u23E9 '+p.desc+' (no pick)';$('statusBar').className='status-bar'}let cPts=0;if(S.cpuPick){cPts=scoreCall(S.cpuPick,p.callCode,p.playResult);if(S.rbiPickCPU&&p.playRbi>0)cPts+=40;S.cpuScore+=cPts}$('yourScore').textContent=S.userScore;$('cpuScore').textContent=S.cpuScore;$('streakDisplay').innerHTML=S.streak+'\uD83D\uDD25';addHistory(p,uPts);S.userPick='';S.cpuPick='';S.rbiPick=false;S.rbiPickCPU=false;setPred(true);setTimeout(()=>{$('statusBar').className='status-bar';if(!S.userPick&&S.gameActive)$('statusBar').textContent='\uD83C\uDFAF Make your call!'},2500)}
function clearZone(){$('pitchDots').innerHTML='';S.pitchHistory=[]}
function drawPitch(p){if(p.pX===null||p.pZ===null)return;const svgX=80+(p.pX/2)*80,svgY=200-(p.pZ/5)*200;let color='#64748b';const cc=p.callCode;if(cc==='B')color='#4ade80';else if(cc==='C'||cc==='S'||cc==='T')color='#ef4444';else if(cc==='F')color='#f59e0b';else if(cc==='D'||cc==='E'||cc==='X')color='#3b82f6';const dots=$('pitchDots');dots.querySelectorAll('circle').forEach(c=>{c.setAttribute('opacity',Math.max(0.15,parseFloat(c.getAttribute('opacity')||1)-0.15))});dots.querySelectorAll('text').forEach(t=>{t.setAttribute('opacity',Math.max(0.1,parseFloat(t.getAttribute('opacity')||1)-0.15))});S.pitchHistory.push({x:svgX,y:svgY,color});if(S.pitchHistory.length>15){S.pitchHistory.shift();if(dots.children.length>=2){dots.removeChild(dots.children[0]);dots.removeChild(dots.children[0])}}const szTop=200-(p.szTop/5)*200,szBot=200-(p.szBot/5)*200,szH=szBot-szTop;$('szRect').setAttribute('y',szTop);$('szRect').setAttribute('height',szH);const t1=szH/3;$('szH1').setAttribute('y1',szTop+t1);$('szH1').setAttribute('y2',szTop+t1);$('szH2').setAttribute('y1',szTop+2*t1);$('szH2').setAttribute('y2',szTop+2*t1);[$('szV1'),$('szV2')].forEach(l=>{l.setAttribute('y1',szTop);l.setAttribute('y2',szBot)});if(p.speed){const txt=document.createElementNS('http://www.w3.org/2000/svg','text');txt.setAttribute('x',svgX);txt.setAttribute('y',svgY+3.5);txt.setAttribute('text-anchor','middle');txt.setAttribute('font-size','7');txt.setAttribute('font-weight','700');txt.setAttribute('fill','#000');txt.setAttribute('opacity','1');txt.textContent=Math.round(p.speed);dots.appendChild(txt)}const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');circle.setAttribute('cx',svgX);circle.setAttribute('cy',svgY);circle.setAttribute('r','6');circle.setAttribute('fill',color);circle.setAttribute('opacity','1');circle.setAttribute('stroke','#fff');circle.setAttribute('stroke-width','1.5');dots.appendChild(circle)}
function addHistory(p,uPts){const log=$('historyLog'),el=document.createElement('div');el.className='hist-entry';const typeLabel=p.typeDesc?' ('+p.typeDesc+(p.speed?' '+Math.round(p.speed)+'mph':'')+')'  :'';const ptsHtml=uPts>0?'<span class="pts-good">+'+uPts+'</span>':'<span class="pts-bad">+0</span>';el.innerHTML='<span class="pitch-num">#'+p.pitchNum+'</span> '+p.desc+typeLabel+' '+ptsHtml;log.prepend(el);while(log.children.length>30)log.removeChild(log.lastChild)}
function showHalftime(inn,half){S.halfTimeShown=true;$('htTitle').textContent='\uD83C\uDFDF Mid-Game \u2014 '+half+' '+ordinal(inn);let msg='You: '+S.userScore+' pts | CPU: '+S.cpuScore+' pts\n';if(S.userScore>S.cpuScore)msg+='\uD83D\uDFE2 You are winning!';else if(S.cpuScore>S.userScore)msg+='\uD83D\uDD34 CPU leads \u2014 rally!';else msg+='\uD83D\uDFE1 Tied!';$('htBody').textContent=msg;$('halftimeAlert').classList.add('show');setTimeout(()=>$('halftimeAlert').classList.remove('show'),8000)}
function saveLB(){if(!S.playerName){S.playerName=prompt('Your name for the leaderboard:','Player 1')||'Anonymous';localStorage.setItem('dg_name',S.playerName)}let found=false;for(const e of S.leaderboard){if(e.n===S.playerName){if(e.s<S.userScore)e.s=S.userScore;found=true;break}}if(!found)S.leaderboard.push({n:S.playerName,s:S.userScore});S.leaderboard.sort((a,b)=>b.s-a.s);if(S.leaderboard.length>10)S.leaderboard.length=10;localStorage.setItem('dg_lb',JSON.stringify(S.leaderboard))}
function renderHomeLB(){const el=$('homeLB');if(!S.leaderboard.length){el.innerHTML='<h3>\uD83C\uDFC6 Leaderboard</h3><div style="color:#64748b;font-size:13px">No scores yet</div>';return}let html='<h3>\uD83C\uDFC6 Leaderboard</h3>';S.leaderboard.slice(0,5).forEach((e,i)=>{const medal=i===0?'\uD83E\uDD47':i===1?'\uD83E\uDD48':i===2?'\uD83E\uDD49':'';html+='<div class="lb-row"><span class="rank">'+(medal||(i+1)+'.')+'</span><span class="name">'+e.n+'</span><span class="pts">'+e.s+'</span></div>'});el.innerHTML=html}
function ordinal(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0])}
document.addEventListener('visibilitychange',()=>{if(document.hidden){clearInterval(S.fetchInterval);clearInterval(S.queueInterval)}else if(S.gameActive){fetchGame();S.fetchInterval=setInterval(fetchGame,4000);S.queueInterval=setInterval(processQueue,1000)}});window.addEventListener('beforeunload',()=>{if(S.userScore>0)saveLB()});renderHomeLB();loadGames();
</script></body></html>
