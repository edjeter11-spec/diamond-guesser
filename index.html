async function loadGames(){const ll=$('liveGamesList'),ol=$('otherGamesList'),os=$('otherGamesSection');ll.innerHTML='<div class="skeleton"></div>';ol.innerHTML='';os.style.display='none';try{const d=new Date(),ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');const r=await fetch('https://statsapi.mlb.com/api/v1/schedule?sportId=1&date='+ds+'&hydrate=linescore');const data=await r.json(),games=(data.dates&&data.dates[0]&&data.dates[0].games)||[];const live=games.filter(g=>g.status.abstractGameState==='Live');const other=games.filter(g=>g.status.abstractGameState!=='Live');if(!live.length&&!other.length){ll.innerHTML='<div style="text-align:center;color:#64748b;padding:20px">No games today</div>';return}ll.innerHTML='';if(!live.length)ll.innerHTML='<div style="text-align:center;color:#64748b;padding:12px;font-size:13px">No live games right now</div>';live.forEach(g=>ll.appendChild(makeGC(g,'live')));if(other.length){os.style.display='block';other.forEach(g=>{const c=g.status.abstractGameState==='Final'?'final':'preview';ol.appendChild(makeGC(g,c))})}}catch(e){ll.innerHTML='<div style="text-align:center;color:#ef4444;padding:16px">Failed to load</div>'}}

  try{const dt=d.gameData.datetime;const fp=dt.firstPitch||dt.dateTime;if(fp){const t=new Date(fp);const now=new Date();const diff=t-now;if(diff>0){const mins=Math.floor(diff/60000);$('gameTime').textContent='\u23F0 First pitch in '+mins+' min';$('statusBar').textContent='\uD83C\uDFDF Game starts in '+mins+' minutes...';setPred(false)}else{const h=t.getHours(),m=t.getMinutes();$('gameTime').textContent='\u23F0 Started '+(h>12?h-12:h)+':'+String(m).padStart(2,'0')+(h>=12?' PM':' AM')}}}catch(e){}
  try{const allPlays=d.liveData.plays.allPlays||[];const spIdx=d.liveData.plays.scoringPlays||[];const scoring=spIdx.length?spIdx.map(i=>allPlays[i]).filter(Boolean):allPlays.filter(p=>p&&p.about&&p.about.isScoringPlay);if(scoring.length){$('scoringSummary').style.display='';const el=$('scoringPlays');let html='';const aAbr=d.gameData.teams.away.abbreviation||'AWY';const hAbr=d.gameData.teams.home.abbreviation||'HME';scoring.forEach(p=>{const inn=p.about?ordinal(p.about.inning):'';const desc=p.result?p.result.description:'';const as=p.result?p.result.awayScore:0;const hs=p.result?p.result.homeScore:0;html+='<div class="scoring-play"><span class="sp-inning">'+inn+'</span><span class="sp-desc">'+desc+'</span><span class="sp-score">'+aAbr+' '+as+'-'+hs+' '+hAbr+'</span></div>'});el.innerHTML=html}}catch(e){}const cp=d.liveData.plays&&d.liveData.plays.currentPlay;if(cp&&cp.matchup){$('pitcherName').textContent=cp.matchup.pitcher?cp.matchup.pitcher.fullName:'\u2014';$('batterName').textContent=cp.matchup.batter?cp.matchup.batter.fullName:'\u2014';if(cp.matchup.pitcher&&cp.matchup.pitcher.id)$('pitcherImg').src='https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_80,q_auto:best/v1/people/'+cp.matchup.pitcher.id+'/headshot/67/current';if(cp.matchup.batter&&cp.matchup.batter.id)$('batterImg').src='https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_80,q_auto:best/v1/people/'+cp.matchup.batter.id+'/headshot/67/current';const bid=cp.matchup.batter?cp.matchup.batter.id:0;if(bid&&bid!==S.lastBatterId){S.lastBatterId=bid;S.atBatPick='';S.atBatCPU='';S.atBatResolved=false;$('atbatBar').classList.remove('locked','open');$('atbatLocked').textContent='';document.querySelectorAll('.ab-btn').forEach(b=>b.disabled=false);clearZone()}}if(cp&&cp.count){const c=cp.count;S.currentCount={balls:c.balls,strikes:c.strikes};S.currentOuts=c.outs;$('countDisplay').innerHTML='<span>'+c.balls+'</span>-<span>'+c.strike function getCountMult(pick,b,s){if(pick==='Ball'){if(b>=3)return 0.5;if(s>=2)return 1.8;return 1.0}if(pick==='Strike'){if(b>=3)return 2.0;if(s>=2)return 0.6;return 1.0+b*0.2}if(pick==='Foul'){if(s>=2)return 0.8;if(s===0)return 1.5;return 1.0}return 1.0}
function updateDynamicOdds(b,s){$('ptsBall').textContent=Math.round(5*getCountMult('Ball',b,s));$('ptsStrike').textContent=Math.round(10*getCountMult('Strike',b,s));$('ptsFoul').textContent=Math.round(15*getCountMult('Foul',b,s))}
function getSitMult(){const fc=S.currentCount.balls===3&&S.currentCount.strikes===2;const to=S.currentOuts===2;const risp=S.runnersOnSecond||S.runnersOnThird;const clutch=S.currentInning>=7&&risp&&to;if(clutch)return{mult:2.0,label:'\u26A1 CLUTCH 2x',cls:'clutch'};let mult=1.0;const labels=[];if(fc){mult=Math.max(mult,1.5);labels.push('\uD83D\uDD25 FULL COUNT 1.5x')}if(to){mult=Math.max(mult,1.3);labels.push('\uD83D\uDEA8 2 OUTS 1.3x')}if(risp){mult=Math.max(mult,1.4);labels.push('\uD83C\uDFC3 RISP 1.4x')}return{mult,labels}}
function updateSitBadges(){const s=getSitMult();const el=$('sitBadges');if(s.label){el.innerHTML='<span class="sit-badge clutch">'+s.label+'</span>';return}if(!s.labels||!s.labels.length){el.innerHTML='';return}el.innerHTML=s.labels.map(l=>'<span class="sit-badge">'+l+'</span>').join('')}
function processQueue(){if(!S.gameActive)return;const delay=parseInt($('delaySlider').value),now=Date.now()/1000;S.pendingPitches=S.pendingPitches.filter(p=>{if(now-p.time>=delay){resolvePitch(p);return false}return true})}$('delaySlider').addEventListener('input',e=>{$('delayVal').textContent=e.target.value+'s'});

function predict(choice){if(S.userPick||!S.gameActive||S.gamePaused)return;S.userPick=choice;S.pitchTypePick='';$('hitSub').classList.remove('open');setPred(false);$('ptypeRow').classList.add('open');document.querySelectorAll('.ptype-btn').forEach(b=>b.classList.remove('sel'));const lbl=choice+(S.rbiPick?' +RBI':'');$('statusBar').textContent='\uD83D\uDD12 '+lbl+' \u2014 pick pitch type or wait...';$('statusBar').className='status-bar';const r=Math.random()*100,hr=Math.random()*100;S.cpuPick=r<38?'Ball':r<55?'Strike':r<73?'Foul':r<83?'Out':r<90?(hr<65?'Single':hr<90?'Double':'Triple'):'Homer';S.rbiPickCPU=S.runnersOn>0&&Math.random()<0.4;const ptr=Math.random()*100;S.pitchTypeCPU=ptr<50?'Fastball':ptr<80?'Breaking':'Offspeed';if(navigator.vibrate)navigator.vibrate(30)}

const AB_SCORES={Strikeout:25,Walk:30,Groundout:20,Flyout:20,Single:50,Double:100,Triple:200,'Home Run':250};
function resolveAtBat(event){S.atBatResolved=true;let ev=event;if(ev.includes('Strikeout'))ev='Strikeout';if(ev.includes('Walk'))ev='Walk';if(ev.includes('Groundout')||ev.includes('Grounded'))ev='Groundout';if(ev.includes('Flyout')||ev.includes('Fly Out')||ev.includes('Pop Out')||ev.includes('Lineout'))ev='Flyout';let uPts=0,cPts=0;if(S.atBatPick){if(S.atBatPick===ev)uPts=AB_SCORES[ev]||30;S.userScore+=uPts}if(S.atBatCPU){if(S.atBatCPU===ev)cPts=AB_SCORES[ev]||30;S.cpuScore+=cPts}if(S.atBatPick){const log=$('historyLog'),el=document.createElement('div');el.className='hist-entry';el.innerHTML='<span class="pitch-num">AB</span> '+ev+' '+(uPts>0?'<span class="pts-good">+'+uPts+'</span>':'<span class="pts-bad">+0</span>');log.prepend(el)}$('yourScore').textContent=S.userScore;$('cpuScore').textContent=S.cpuScore;$('atbatLocked').textContent='\u2705 '+ev+(S.atBatPick===ev?' NAILED IT!':'')}
function classifyPitchType(code){if(['FF','SI','FC'].includes(code))return 'Fastball';if(['ST','SL','CU','KC','CS','KN'].includes(code))return 'Breaking';if(['CH','FS','EP','FO','SC'].includes(code))return 'Offspeed';return 'Fastball'}
function scoreCall(pick,cc,pr,b,s){let base=0;if(pick==='Ball'&&cc==='B')base=5;else if(pick==='Strike'&&(cc==='C'||cc==='S'||cc==='T'))base=10;else if(pick==='Foul'&&cc==='F')base=15;else if(pick==='Out'&&cc==='X')base=30;else if(pick==='Single'&&cc==='D'&&pr==='Single')base=60;else if(pick==='Double'&&cc==='D'&&pr==='Double')base=120;else if(pick==='Triple'&&cc==='D'&&pr==='Triple')base=250;else if((pick==='Single'||pick==='Double'||pick==='Triple')&&cc==='D')base=15;else if(pick==='Homer'&&cc==='E')base=200;if(base===0)return 0;if(pick==='Ball'||pick==='Strike'||pick==='Foul')base=Math.round(base*getCountMult(pick,b,s));return base}
function resolvePitch(p){drawPitch(p);$('ptypeRow').classList.remove('open');let uPts=0;if(S.userPick){uPts=scoreCall(S.userPick,p.callCode,p.playResult,p.countBalls,p.countStrikes);if(S.rbiPick&&p.playRbi>0)uPts+=40;if(S.pitchTypePick&&uPts>0&&classifyPitchType(p.typeCode)===S.pitchTypePick)uPts+=20;if(uPts>0){const sit=getSitMult();uPts=Math.round(uPts*sit.mult);S.streak++;if(S.streak>S.bestStreak)S.bestStreak=S.streak;if(S.streak>=3)uPts+=Math.floor((S.streak-2)*uPts*0.1)}else{S.streak=0}S.userScore+=uPts;if(uPts>0){$('statusBar').textContent='\u2705 +'+uPts+'! '+p.desc;$('statusBar').className='status-bar correct';if(navigator.vibrate)navigator.vibrate([50,30,50])}else{$('statusBar').textContent='\u274C '+p.desc;$('statusBar').className='status-bar wrong';if(navigator.vibrate)navigator.vibrate(100)}}else{$('statusBar').textContent='\u23E9 '+p.desc+' (no pick)';$('statusBar').className='status-bar'}let cPts=0;if(S.cpuPick){cPts=scoreCall(S.cpuPick,p.callCode,p.playResult,p.countBalls,p.countStrikes);if(S.rbiPickCPU&&p.playRbi>0)cPts+=40;if(S.pitchTypeCPU&&cPts>0&&classifyPitchType(p.typeCode)===S.pitchTypeCPU)cPts+=20;if(cPts>0){const sit=getSitMult();cPts=Math.round(cPts*sit.mult)}S.cpuScore+=cPts}$('yourScore').textContent=S.userScore;$('cpuScore').textContent=S.cpuScore;$('streakDisplay').innerHTML=S.streak+'\uD83D\uDD25';addHistory(p,uPts);S.userPick='';S.cpuPick='';S.rbiPick=false;S.rbiPickCPU=false;S.pitchTypePick='';S.pitchTypeCPU='';if(!S.gamePaused)setPred(true);setTimeout(()=>{$('statusBar').className='status-bar';if(!S.userPick&&S.gameActive&&!S.gamePaused)$('statusBar').textContent='\uD83C\uDFAF Make your call!'},2500)}
function clearZone(){$('pitchDots').innerHTML='';S.pitchHistory=[]}
function drawPitch(p){if(p.pX===null||p.pZ===null)return;const svgX=80+(p.pX/2)*80,svgY=200-(p.pZ/5)*200;let color='#64748b';const cc=p.callCode;if(cc==='B')color='#4ade80';else if(cc==='C'||cc==='S'||cc==='T')color='#ef4444';else if(cc==='F')color='#f59e0b';else if(cc==='D'||cc==='E'||cc==='X')color='#3b82f6';const dots=$('pitchDots');dots.querySelectorAll('circle').forEach(c=>{c.setAttribute('opacity',Math.max(0.15,parseFloat(c.getAttribute('opacity')||1)-0.15))});dots.querySelectorAll('text').forEach(t=>{t.setAttribute('opacity',Math.max(0.1,parseFloat(t.getAttribute('opacity')||1)-0.15))});S.pitchHistory.push({x:svgX,y:svgY,color});if(S.pitchHistory.length>15){S.pitchHistory.shift();if(dots.children.length>=2){dots.removeChild(dots.children[0]);dots.removeChild(dots.children[0])}}const szTop=200-(p.szTop/5)*200,szBot=200-(p.szBot/5)*200,szH=szBot-szTop;$('szRect').setAttribute('y',szTop);$('szRect').setAttribute('height',szH);const t1=szH/3;$('szH1').setAttribute('y1',szTop+t1);$('szH1').setAttribute('y2',szTop+t1);$('szH2').setAttribute('y1',szTop+2*t1);$('szH2').setAttribute('y2',szTop+2*t1);[$('szV1'),$('szV2')].forEach(l=>{l.setAttribute('y1',szTop);l.setAttribute('y2',szBot)});if(p.speed){const txt=document.createElementNS('http://www.w3.org/2000/svg','text');txt.setAttribute('x',svgX);txt.setAttribute('y',svgY+3.5);txt.setAttribute('text-anchor','middle');txt.setAttribute('font-size','7');txt.setAttribute('font-weight','700');txt.setAttribute('fill','#000');txt.setAttribute('opacity','1');txt.textContent=Math.round(p.speed);dots.appendChild(txt)}const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');circle.setAttribute('cx',svgX);circle.setAttribute('cy',svgY);circle.setAttribute('r','6');circle.setAttribute('fill',color);circle.setAttribute('opacity','1');circle.setAttribute('stroke','#fff');circle.setAttribute('stroke-width','1.5');dots.appendChild(circle)}
function addHistory(p,uPts){const log=$('historyLog'),el=document.createElement('div');el.className='hist-entry';const tl=p.typeDesc?' ('+p.typeDesc+(p.speed?' '+Math.round(p.speed)+'mph':'')+')'  :'';const ph=uPts>0?'<span class="pts-good">+'+uPts+'</span>':'<span class="pts-bad">+0</span>';el.innerHTML='<span class="pitch-num">#'+p.pitchNum+'</span> '+p.desc+tl+' '+ph;log.prepend(el);while(log.children.length>30)log.removeChild(log.lastChild)}
function showHalftime(inn,half){S.halfTimeShown=true;$('htTitle').textContent='\uD83C\uDFDF Mid-Game \u2014 '+half+' '+ordinal(inn);let msg='You: '+S.userScore+' | CPU: '+S.cpuScore+'\n';msg+=S.userScore>S.cpuScore?'\uD83D\uDFE2 Winning!':S.cpuScore>S.userScore?'\uD83D\uDD34 CPU leads!':'\uD83D\uDFE1 Tied!';$('htBody').textContent=msg;$('halftimeAlert').classList.add('show');setTimeout(()=>$('halftimeAlert').classList.remove('show'),8000)}
function saveLB(){if(!S.playerName){S.playerName=prompt('Your name:','Player 1')||'Anonymous';localStorage.setItem('dg_name',S.playerName)}let f=false;for(const e of S.leaderboard){if(e.n===S.playerName){if(e.s<S.userScore)e.s=S.userScore;f=true;break}}if(!f)S.leaderboard.push({n:S.playerName,s:S.userScore});S.leaderboard.sort((a,b)=>b.s-a.s);if(S.leaderboard.length>10)S.leaderboard.length=10;localStorage.setItem('dg_lb',JSON.stringify(S.leaderboard))}
function renderHomeLB(){const el=$('homeLB');if(!S.leaderboard.length){el.innerHTML='<h3>\uD83C\uDFC6 Leaderboard</h3><div style="color:#64748b;font-size:13px">No scores yet</div>';return}let h='<h3>\uD83C\uDFC6 Leaderboard</h3>';S.leaderboard.slice(0,5).forEach((e,i)=>{const m=i===0?'\uD83E\uDD47':i===1?'\uD83E\uDD48':i===2?'\uD83E\uDD49':'';h+='<div class="lb-row"><span class="rank">'+(m||(i+1)+'.')+'</span><span class="name">'+e.n+'</span><span class="pts">'+e.s+'</span></div>'});el.innerHTML=h}
function ordinal(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0])}
document.addEventListener('visibilitychange',()=>{if(document.hidden){clearInterval(S.fetchInterval);clearInterval(S.queueInterval)}else if(S.gameActive){fetchGame();S.fetchInterval=setInterval(fetchGame,4000);S.queueInterval=setInterval(processQueue,1000)}});window.addEventListener('beforeunload',()=>{if(S.userScore>0)saveLB()});renderHomeLB();loadGames();
</script></body></html>
